# Версия docker-compose, которую мы используем. Зависит от установленной версии docker
version: '3.9'

services:
  # БД-контейнер
  mysql:
    # Сборка из образа mysql
    image: mysql:8.0
    # Название контейнера для управления на хосте
    container_name: mysql_container
    # {Порт на хосте}:{Порт на стороне контейнера}
    ports:
      - "3316:3306"
    # При закрытии повторно запускается
    restart: always
    # Папки, в которых происходит дублирование файлов на сторонах >>> {на хосте}:{внутри контейнера}
    volumes:
      - ./src:/var/lib/mysql
    # Передача параметров из файла
    env_file:
      - .env
